<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statistics - LockBird</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 360px;
        min-height: 420px;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", Roboto, Helvetica, sans-serif;
        background-color: #000000;
        color: #e7e9ea;
        font-size: 14px;
        line-height: 1.4;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid #2f3336;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        width: 24px;
        height: 24px;
        border-radius: 6px;
      }

      .title {
        font-size: 16px;
        font-weight: 700;
        color: #e7e9ea;
        letter-spacing: -0.3px;
      }

      .back-button {
        background: transparent;
        border: 1px solid #536471;
        color: #e7e9ea;
        padding: 6px 12px;
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .back-button:hover {
        background: rgba(239, 243, 244, 0.1);
        border-color: #e7e9ea;
      }

      /* Content */
      .content {
        padding: 12px 16px;
      }

      /* Period Selector */
      .period-selector {
        display: flex;
        gap: 2px;
        margin-bottom: 16px;
        background: #16181c;
        padding: 3px;
        border-radius: 9999px;
      }

      .period-button {
        flex: 1;
        padding: 7px 4px;
        background: transparent;
        border: none;
        color: #71767b;
        font-size: 11px;
        font-weight: 600;
        border-radius: 9999px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .period-button.active {
        background: #e7e9ea;
        color: #0f1419;
      }

      .period-button:hover:not(.active) {
        background: rgba(239, 243, 244, 0.1);
        color: #e7e9ea;
      }

      /* Stats Grid */
      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 16px;
      }

      .stat-card {
        background: #16181c;
        border-radius: 12px;
        padding: 14px;
      }

      .stat-card.full-width {
        grid-column: 1 / -1;
      }

      .stat-card.saved {
        border-left: 3px solid #00ba7c;
      }

      .stat-card.lost {
        border-left: 3px solid #f4212e;
      }

      .stat-card.net {
        border-left: 3px solid #1d9bf0;
      }

      .stat-icon {
        font-size: 20px;
        margin-bottom: 8px;
      }

      .stat-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #71767b;
        margin-bottom: 6px;
      }

      .stat-value {
        font-size: 24px;
        font-weight: 700;
        color: #e7e9ea;
        margin-bottom: 2px;
        letter-spacing: -0.5px;
      }

      .stat-value.money {
        color: #00ba7c;
      }

      .stat-value.lost {
        color: #f4212e;
      }

      .stat-value.net-positive {
        color: #00ba7c;
      }

      .stat-value.net-negative {
        color: #f4212e;
      }

      .stat-subtitle {
        font-size: 11px;
        color: #71767b;
      }

      /* Insight Card */
      .insight-card {
        background: #16181c;
        border-radius: 12px;
        padding: 14px;
        border-left: 3px solid #ffd400;
      }

      .insight-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .insight-icon {
        font-size: 16px;
      }

      .insight-title {
        font-size: 13px;
        font-weight: 700;
        color: #e7e9ea;
      }

      .insight-text {
        font-size: 12px;
        line-height: 1.5;
        color: #71767b;
      }

      /* Footer */
      .footer {
        text-align: center;
        padding: 12px 16px;
        font-size: 11px;
        color: #536471;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #3d4144;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #536471;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <img
          src="images/icon-header.png"
          alt="Logo"
          class="logo"
        />
        <div class="title">Statistics</div>
      </div>
      <a href="popup.html" class="back-button">← Back</a>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Period Selector -->
      <div class="period-selector">
        <button class="period-button active" data-period="today">Today</button>
        <button class="period-button" data-period="week">Week</button>
        <button class="period-button" data-period="month">Month</button>
        <button class="period-button" data-period="year">Year</button>
        <button class="period-button" data-period="all">All</button>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card saved">
          <div class="stat-icon">💰</div>
          <div class="stat-label">Money Saved</div>
          <div class="stat-value money" id="moneySaved">$0.00</div>
          <div class="stat-subtitle" id="timeSaved">0h 0m productive</div>
        </div>

        <div class="stat-card lost">
          <div class="stat-icon">💸</div>
          <div class="stat-label">Money Lost</div>
          <div class="stat-value lost" id="moneyLost">$0.00</div>
          <div class="stat-subtitle" id="timeWasted">0h 0m wasted</div>
        </div>

        <div class="stat-card full-width net">
          <div class="stat-icon">📊</div>
          <div class="stat-label">Net Impact</div>
          <div class="stat-value net-positive" id="netImpact">$0.00</div>
          <div class="stat-subtitle" id="netSubtitle">Keep going!</div>
        </div>
      </div>

      <!-- Insight Card -->
      <div class="insight-card">
        <div class="insight-header">
          <span class="insight-icon">💡</span>
          <span class="insight-title" id="insightTitle">Insight</span>
        </div>
        <div class="insight-text" id="insightText">Loading your personalized insights...</div>
      </div>
    </div>

  
    <script src="statistics.js"></script>
  </body>
</html>
